name: Build RichCore

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade PySide6 pyinstaller

      - name: Build
        run: pyinstaller --noconfirm --clean RichCore_v12.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RichCore_v12
          path: dist/RichCore_v12.exe

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view $env:TAG_NAME 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG_NAME --title $env:TAG_NAME --notes "RichCore $env:TAG_NAME"
          }
          gh release upload $env:TAG_NAME dist/RichCore_v12.exe --clobber
